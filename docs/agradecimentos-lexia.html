<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexIA 2.0 — Agradecimentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --nu-purple: #8A05BE;
      --nu-purple-soft: #c8a2e8;
      --nu-purple-vivid: #a64ce8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #1a0a2a 0%, #0a0010 70%);
      color: #fff;
      font-family: "Space Grotesk", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      overflow: hidden;
      padding: 4rem 1rem;
    }

    .thanks {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      width: 100%;
      max-width: 1200px;
    }

    .thanks-images {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 130px;
    }

    .image {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      border: 2px solid rgba(200, 162, 232, 0.25);
      color: #fff;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.5s cubic-bezier(0.11, 0.8, 0.25, 1);
    }
    .image:hover {
      width: 120px;
      height: 120px;
      border-color: var(--nu-purple-soft);
      box-shadow: 0 8px 40px rgba(138, 5, 190, 0.55);
      font-size: 1.5rem;
    }
    .image.has-photo {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: transparent;
    }

    .thanks-title {
      width: 100%;
      height: clamp(80px, 14vw, 180px);
      position: relative;
      overflow: hidden;
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 900;
      font-size: clamp(2.5rem, 9vw, 9rem);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .word {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      white-space: nowrap;
    }
    .word.main   { color: #f5f5f5; }
    .word.person { color: var(--nu-purple-vivid); text-shadow: 0 0 30px rgba(166, 76, 232, 0.45); }

    .word .letter {
      display: inline-block;
      transition: transform 1s cubic-bezier(0.11, 0.8, 0.25, 1);
    }
    .word.main   .letter { transform: translateY(0); }
    .word.person .letter { transform: translateY(160%); }

    .thanks-images:has(.image:hover) ~ .thanks-title .word.main .letter {
      transform: translateY(-160%);
    }

    .hint {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    .nav-home, .nav-btn {
      position: fixed;
      padding: 0.5em 1em;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 100px;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      opacity: 0.7;
      z-index: 100;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.2);
      transition: opacity 0.2s, transform 0.2s;
    }
    .nav-home { top: 24px; left: 24px; }
    .nav-prev { bottom: 24px; left: 24px; }
    .nav-next { bottom: 24px; right: 24px; }
    .nav-home:hover, .nav-btn:hover { opacity: 1; transform: translateY(-2px); }
  </style>
</head>
<body>
  <a class="nav-home" href="index.html">← Menu</a>
  <a class="nav-btn nav-prev" href="encerramento-lexia.html">← Anterior</a>
  <a class="nav-btn nav-next" href="index.html">Início ⌂</a>

  <section class="thanks">
    <div class="thanks-images" id="images"></div>
    <div class="thanks-title" id="title">
      <span class="word main">AGRADECIMENTOS</span>
    </div>
  </section>
  <div class="hint">passe o mouse sobre os blocos</div>

  <script>
    const people = [
      { name: 'Henrique Marques',  photo: 'https://ca.slack-edge.com/ETG1DAV7H-W013DTY8B8Q-fb38a6b3b161-512' },
      { name: 'Luma Badia',        photo: 'https://ca.slack-edge.com/ETG1DAV7H-W013E53E00Y-9e4b9e45eeb1-512' },
      { name: 'Livia Zaroni',      photo: 'https://ca.slack-edge.com/ETG1DAV7H-U0660U17RD5-cda4be6c67ad-512' },
      { name: 'Barbara Figueira',  photo: 'https://ca.slack-edge.com/ETG1DAV7H-U01SWBXTA92-83e714b8aed7-512' },
    ];

    const palettes = [
      ['#2a0a3a', '#4d0080'],
      ['#3a0a4a', '#6d00a0'],
      ['#1a0a3a', '#5a0090'],
      ['#2a0a4a', '#7d00b0'],
      ['#3a0a5a', '#8a05be'],
      ['#1a0a2a', '#4a0070'],
    ];

    const imagesEl = document.getElementById('images');
    const titleEl  = document.getElementById('title');

    people.forEach((person, i) => {
      const { name, photo } = person;
      const btn = document.createElement('button');
      btn.className = 'image';
      btn.setAttribute('aria-label', name);

      if (photo) {
        btn.classList.add('has-photo');
        btn.style.backgroundImage = `url("${photo}")`;
      } else {
        const initials = name.split(/\s+/).map(s => s[0]).slice(0, 2).join('').toUpperCase();
        btn.textContent = initials;
        const [c1, c2] = palettes[i % palettes.length];
        btn.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
      }

      imagesEl.appendChild(btn);

      const word = document.createElement('span');
      word.className = 'word person';
      word.dataset.img = i + 1;
      word.textContent = name.toUpperCase();
      titleEl.appendChild(word);
    });

    document.querySelectorAll('.word').forEach(word => {
      const text = word.textContent;
      word.textContent = '';
      const chars = [...text];
      const center = (chars.length - 1) / 2;
      chars.forEach((char, i) => {
        const span = document.createElement('span');
        span.className = 'letter';
        span.textContent = char === ' ' ? '\u00a0' : char;
        const distance = Math.abs(i - center);
        const duration = 0.4 + distance * 0.11;
        span.style.transitionDuration = `${duration}s`;
        word.appendChild(span);
      });
    });

    const style = document.createElement('style');
    style.textContent = people.map((_, i) => {
      const n = i + 1;
      return `.thanks-images:has(.image:nth-child(${n}):hover) ~ .thanks-title .word.person[data-img="${n}"] .letter { transform: translateY(0); }`;
    }).join('\n');
    document.head.appendChild(style);

    document.addEventListener('keydown', (e) => {
      if (window.self !== window.top) return;
      if (e.key === 'ArrowRight') location.href = 'index.html';
      if (e.key === 'ArrowLeft')  location.href = 'encerramento-lexia.html';
      if (e.key === 'Escape')     location.href = 'index.html';
    });
  </script>
</body>
</html>
